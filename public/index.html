<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Служба доверия ООО «СУ-10»</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <main class="card">
    <!-- TODO: заменить href на ссылку контакта MAX и убрать aria-disabled/onclick. -->
    <a class="max-link" href="#" aria-disabled="true" onclick="return false" aria-label="Написать в MAX">
      <span class="max-link__icon" aria-hidden="true">MAX</span>
    </a>

    <header class="head">
      <h1 class="head__title">СЛУЖБА ДОВЕРИЯ</h1>
      <p class="head__subtitle">ООО «СУ-10»</p>
    </header>

    <section class="contacts">
      <!-- TODO: заменить на реальный номер (в href — без пробелов и скобок) -->
      <a class="contact" href="tel:+78000000000">
        <span class="contact__label">Телефон доверия</span>
        <span class="contact__value">+7 (800) 000-00-00</span>
      </a>

      <!-- TODO: заменить на реальный e-mail -->
      <a class="contact" href="mailto:dover@su10.ru">
        <span class="contact__label">Почта</span>
        <span class="contact__value">dover@su10.ru</span>
      </a>
    </section>

    <section class="qr" aria-labelledby="qr-title">
      <div class="qr__content">
        <h2 class="qr__title" id="qr-title">QR-код страницы</h2>
        <p class="qr__text">https://sd.su10.ru/</p>
      </div>
      <a class="qr__link" href="https://sd.su10.ru/" aria-label="Открыть https://sd.su10.ru/">
        <img
          class="qr__image"
          src="https://api.qrserver.com/v1/create-qr-code/?size=240x240&amp;margin=12&amp;data=https%3A%2F%2Fsd.su10.ru%2F"
          alt="QR-код для перехода на https://sd.su10.ru/"
          width="168"
          height="168"
        >
      </a>
    </section>

    <p class="note">
      Вы можете обратиться по вопросам нарушений трудовых прав, охраны труда,
      деловой этики и иных нарушений.
    </p>
  </main>
</body>
</html>
