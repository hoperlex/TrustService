<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Служба доверия ООО «СУ-10»</title>
  <!-- Версию поднимать при каждом изменении styles.css, иначе браузеры отдадут старый файл из кэша -->
  <link rel="stylesheet" href="css/styles.css?v=2">
</head>
<body>
  <main class="card">
    <nav class="apps" aria-label="Мессенджеры">
      <a
        class="app-link"
        href="tg://resolve?domain=doveriesu10"
        aria-label="Открыть чат в Telegram"
        title="Открыть чат в Telegram"
      >
        <img class="app-link__icon" src="telegram-48.png" alt="" width="44" height="44">
      </a>

      <a
        class="app-link"
        href="https://max.ru/u/f9LHodD0cOIIAjnVedCztt0zDbsDTWZDh3Cji9pZ3BIkIZlHMyJpK0WMaXY"
        aria-label="Открыть чат в MAX"
        title="Открыть чат в MAX"
      >
        <img class="app-link__icon" src="max-messenger-sign-logo.png" alt="" width="44" height="44">
      </a>
    </nav>

    <header class="head">
      <h1 class="head__title">СЛУЖБА ДОВЕРИЯ</h1>
      <p class="head__subtitle">ООО «СУ-10»</p>
    </header>

    <section class="contacts">
      <!-- TODO: заменить на реальный номер (в href — без пробелов и скобок) -->
      <a class="contact" href="tel:+79151520048">
        <span class="contact__label">Телефон доверия</span>
        <span class="contact__value">+7 (915) 152-00-48</span>
      </a>

      <!-- TODO: заменить на реальный e-mail -->
      <a class="contact" href="mailto:doverie@su10.ru">
        <span class="contact__label">Почта</span>
        <span class="contact__value">doverie@su10.ru</span>
      </a>
    </section>

    <section class="qr" aria-labelledby="qr-title">
      <h2 class="qr__title" id="qr-title">QR-код страницы</h2>
      <a class="qr__link" href="https://sd.su10.ru/" aria-label="Открыть https://sd.su10.ru/">
        <span class="qr__code">
          <img
            class="qr__image"
            src="sd-su10-ru-qr.svg"
            alt="QR-код для перехода на https://sd.su10.ru/"
            width="260"
            height="260"
          >
        </span>
      </a>
    </section>

    <p class="note">
      Вы можете обратиться по вопросам нарушений трудовых прав, охраны труда,
      деловой этики и иных нарушений.
    </p>
  </main>
</body>
</html>
