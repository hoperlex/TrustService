<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Служба доверия ООО «СУ-10»</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <main class="card">
    <a
      class="max-link"
      href="tel:+79151520048"
      aria-label="Связаться по телефону +7 (915) 152-00-48"
      title="+7 (915) 152-00-48"
    >
      <span class="max-link__icon" aria-hidden="true">MAX</span>
    </a>

    <header class="head">
      <h1 class="head__title">СЛУЖБА ДОВЕРИЯ</h1>
      <p class="head__subtitle">ООО «СУ-10»</p>
    </header>

    <section class="contacts">
      <!-- TODO: заменить на реальный номер (в href — без пробелов и скобок) -->
      <a class="contact" href="tel:+79151520048">
        <span class="contact__label">Телефон доверия</span>
        <span class="contact__value">+7 (915) 152-00-48</span>
      </a>

      <!-- TODO: заменить на реальный e-mail -->
      <a class="contact" href="mailto:doverie@su10.ru">
        <span class="contact__label">Почта</span>
        <span class="contact__value">doverie@su10.ru</span>
      </a>
    </section>

    <section class="qr" aria-labelledby="qr-title">
      <h2 class="qr__title" id="qr-title">QR-код страницы</h2>
      <a class="qr__link" href="https://sd.su10.ru/" aria-label="Открыть https://sd.su10.ru/">
        <span class="qr__code">
          <img
            class="qr__image"
            src="https://api.qrserver.com/v1/create-qr-code/?size=420x420&amp;margin=0&amp;qzone=4&amp;ecc=H&amp;data=https%3A%2F%2Fsd.su10.ru%2F%3Fsource%3Dqr-su10-general-contractor"
            alt="QR-код для перехода на https://sd.su10.ru/"
            width="260"
            height="260"
          >
          <span class="qr__badge" aria-hidden="true">
            <span class="qr__brand">СУ_10</span>
            <span class="qr__caption">ГЕНЕРАЛЬНЫЙ ПОДРЯДЧИК</span>
          </span>
        </span>
      </a>
    </section>

    <p class="note">
      Вы можете обратиться по вопросам нарушений трудовых прав, охраны труда,
      деловой этики и иных нарушений.
    </p>
  </main>
</body>
</html>
