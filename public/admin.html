<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Обращения · Служба доверия ООО «СУ-10»</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div class="admin">
    <header class="admin__bar">
      <div>
        <h1 class="admin__title">Обращения</h1>
        <p class="admin__subtitle">Служба доверия ООО «СУ-10»</p>
      </div>
      <div class="admin__actions">
        <button type="button" id="refresh-btn" class="btn btn--ghost">Обновить</button>
        <button type="button" id="logout-btn" class="btn btn--ghost">Выйти</button>
      </div>
    </header>

    <p id="admin-message" class="admin__message" role="status" aria-live="polite"></p>

    <div class="table-wrap">
      <table class="table">
        <thead>
          <tr>
            <th>Дата</th>
            <th>ФИО</th>
            <th>Телефон</th>
            <th>E-mail</th>
            <th class="table__msg">Текст обращения</th>
            <th>Статус</th>
          </tr>
        </thead>
        <tbody id="appeals-body"></tbody>
      </table>
      <p id="empty-note" class="admin__empty" hidden>Обращений пока нет.</p>
    </div>
  </div>

  <script src="/js/admin.js"></script>
</body>
</html>
