# Стартовый HTTP-vhost для «Служба доверия ООО СУ-10» (статика).
# /etc/nginx/sites-available/sb.su10.ru + симлинк в sites-enabled/.
# Веб-корень — public/ из репозитория, клонированного в /var/www/sb.su10.ru.
#
# HTTPS добавляет `certbot --nginx -d sb.su10.ru --redirect`: он сам допишет
# блок `listen 443 ssl`, пути к сертификату и редирект 80 → 443.

server {
    listen 80;
    server_name sb.su10.ru;

    root  /var/www/sb.su10.ru/public;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }
}
