# vhost для информационной страницы «Служба доверия ООО СУ-10» (статика).
# /etc/nginx/sites-available/sb.su10.ru + симлинк в sites-enabled/.
# Веб-корень — public/ из репозитория, клонированного в /srv/sb.

server {
    listen 80;
    server_name sb.su10.ru;

    # Валидация Let's Encrypt (webroot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name sb.su10.ru;

    ssl_certificate     /etc/letsencrypt/live/sb.su10.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sb.su10.ru/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    root  /srv/sb/public;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }
}
