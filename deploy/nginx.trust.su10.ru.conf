# vhost для «Служба доверия ООО СУ-10».
# Кладётся в /etc/nginx/sites-available/trust.su10.ru + симлинк в sites-enabled/.
# Домен и, при необходимости, конкретный IP в listen — заменить под свой сервер.

server {
    listen 80;
    server_name trust.su10.ru;

    # Валидация Let's Encrypt (webroot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Остальное — на HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name trust.su10.ru;

    ssl_certificate     /etc/letsencrypt/live/trust.su10.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/trust.su10.ru/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    # Обращения короткие — ограничиваем размер тела
    client_max_body_size 256k;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
